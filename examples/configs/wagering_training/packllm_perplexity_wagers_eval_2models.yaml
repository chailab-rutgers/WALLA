# Evaluation configuration for PackLLM perplexity wagers on PubMedQA
# This method is inference-only (no training) and requires model_perplexities.

# Include model configs (must match training/inference setup)
_include_models:
  - models/llama3_1_8b_instruct.yaml
  - models/llama3_aloe_8b_alpha.yaml

# Checkpoint path (inference-only method; checkpoint can be a dummy path)
checkpoint_path: /research/projects/ecoai/yl2310/MultiLLMs/checkpoints/dummy_packllm_perplexity_wagers

# Apply adaptive temperature scaling to cached option logits before wagering.
calibrated: false
_include_calibration: calibration/adaptive_temperature_1000samples.yaml


shuffle_data: true
shuffle_seed: 18 #1d8 #17

# Wagering method - PackLLM-style inverse perplexity weighting (inference-only)
wagering_method:
  name: packllm_perplexity_wagers
  config:
    tau: 1.0
    epsilon: 1.0e-12

# Aggregation function
aggregation:
  name: linear_pooling
  config: {}

