# Full end-to-end pipeline configuration for cluster_saturation_bayes
# Combines training and evaluation in a single config file

# ============================================================================
# SHARED CONFIGURATION (used by both training and evaluation)
# ============================================================================

# Models (shared between training and evaluation)
_include_models:
  - models/gemma_2_9b_it.yaml
  - models/gemma_2_9b_it.yaml
  - models/gemma_2_9b_it.yaml
  - models/gemma_2_9b_it.yaml
  - models/gemma_2_9b_it.yaml
  - models/gemma_2_9b_it.yaml
  - models/gemma_2_9b_it.yaml
  - models/gemma_2_9b_it.yaml
# Apply adaptive temperature scaling to cached option logits before wagering.
calibrated: false

# Wagering method (must match between training and evaluation)
wagering_method:
  name: centralized_wagers
  config:
    hidden_dim: 4096
    hidden_layers: [512, 256]
    hidden_state_layers_per_model: [-1, -1, -1, -1, -1, -1, -1, -1]
    learning_rate: 5e-6
    lr_decay_factor: 1
    lr_decay_steps: 100
    temperature: 2.0
    grad_clip_norm: 1.0
    normalize_hidden_states: false
    device: cuda:0

# Aggregation function (must match between training and evaluation)
aggregation:
  name: linear_pooling
  config: {}

# Binary option tokens for this synthetic dataset.
option_tokens: ["1", "0"]
cache_path: /research/projects/ecoai/yl2310/MultiLLMs/cache
# ============================================================================
# TRAINING CONFIGURATION
# ============================================================================

_include_datasets:
  - datasets/cluster_saturation_bayesX.yaml

num_epochs: 5
checkpoint_base_dir: /research/projects/ecoai/yl2310/MultiLLMs/checkpoints
save_every: 100
training_batch_size: 100

auto_resume: false
balance_training_datasets: true
shuffle_data: true
shuffle_seed: 18
early_stopping_patience: 5
early_stopping_criterion: validation
use_min_kl_for_early_stopping: true

report_to_wandb: false
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: centralized_wagers_cluster_saturation_bayesX_mixed_layers_8

# ============================================================================
# EVALUATION CONFIGURATION
# ============================================================================

_include_test_datasets:
  - datasets/cluster_saturation_bayesX.yaml
    # size: 2  # Use a small sample size for quick evaluation during development
