# RouteLLM-style BERT router (arXiv:2406.18665) — PubMedQA, mirrors centralized_wagers_pubmedqa.yaml structure

_include_models:
  - models/llama3_aloe_8b_alpha.yaml
  - models/llama3_aloe_8b_alpha.yaml
  - models/llama3_aloe_8b_alpha.yaml
  - models/llama3_aloe_8b_alpha.yaml

calibrated: false
_include_calibration: calibration/adaptive_temperature_pubmedqa_1000samples.yaml

wagering_method:
  name: route_llm_bert
  config:
    bert_model_name: bert-base-uncased
    max_seq_length: 512
    hidden_state_layers_per_model: [-4,-3,-2,-1]  # Per-model layer picks, aligned with _include_models order
    learning_rate: 5e-5
    lr_decay_factor: 1
    lr_decay_steps: 100
    temperature: 2.0
    grad_clip_norm: 1.0
    weight_decay: 0.01
    freeze_bert: false
    pubmedqa_strip_context: false
    router_dropout: 0.1
    ranking_loss_weight: 0.0
    ranking_margin: 0.1
    device: cuda:0

aggregation:
  name: linear_pooling
  config: {}

option_tokens: ["YES", "NO"]
cache_path: /research/projects/ecoai/yl2310/MultiLLMs/cache
_include_datasets:
  - datasets/pubmedqa_context_only.yaml

num_epochs: 5
checkpoint_base_dir: /research/projects/ecoai/yl2310/MultiLLMs/checkpoints
save_every: 100
training_batch_size: 50

auto_resume: false
balance_training_datasets: true
shuffle_data: true
shuffle_seed: 18 #18
early_stopping_patience: 5
early_stopping_criterion: validation

report_to_wandb: true
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: route_llm_bert_pubmedqa_4

_include_test_datasets:
  - datasets/pubmedqa_context_only.yaml

test_datasets:
  - display_name: pubmedqa_test
