name: adaptive_temperature_scaling
condition_on_context_assignment: true
checkpoint_base_dir: /research/projects/ecoai/yl2310/WALLA/calibration_checkpoints
head_hidden_layers:
- 256
- 64
learning_rate: 1e-4
weight_decay: 1e-5
num_epochs: 25
batch_size: 64
