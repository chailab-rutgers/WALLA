_include_models:
- models/llama3_aloe_8b_alpha.yaml
- models/llama3_aloe_8b_alpha.yaml
- models/llama3_aloe_8b_alpha.yaml
- models/llama3_aloe_8b_alpha.yaml
calibrated: false
wagering_method:
  name: walla_v2
  config:
    hidden_layers:
    - 512
    - 256
    learning_rate: 1e-5
    lr_decay_factor: 1
    lr_decay_steps: 100
    temperature: 2.0
    grad_clip_norm: 1.0
    normalize_hidden_states: false
    device: cuda:0
    common_hidden_dim: 4096
aggregation:
  name: linear_pooling
  config: {}
option_tokens:
- 'YES'
- 'NO'
cache_path: /research/projects/ecoai/yl2310/WALLA/cache
num_epochs: 5
checkpoint_base_dir: /research/projects/ecoai/yl2310/WALLA/checkpoints
training_batch_size: 100
wager_score_plot_every: 200
shuffle_data: true
shuffle_seed: 18
early_stopping_patience: 1500
early_stopping_criterion: online_learning
use_brier_d_regret_for_early_stopping: true
included_dataset: datasets/pubmedqa_context_only.yaml
included_test_dataset: datasets/pubmedqa_context_only.yaml
test_dataset:
  display_name: pubmedqa_test
