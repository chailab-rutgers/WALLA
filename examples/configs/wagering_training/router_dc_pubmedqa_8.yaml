- models/llama3_aloe_8b_alpha.yaml
- models/llama3_aloe_8b_alpha.yaml
- models/llama3_aloe_8b_alpha.yaml
- models/llama3_aloe_8b_alpha.yaml
- models/llama3_aloe_8b_alpha.yaml
- models/llama3_aloe_8b_alpha.yaml
calibrated: false
_include_calibration: calibration/adaptive_temperature_pubmedqa_1000samples.yaml
wagering_method:
  name: router_dc
  config:
    encoder_model_name: microsoft/mdeberta-v3-base
    tokenizer_use_fast: false
    max_seq_length: 512
    learning_rate: 1e-6
    lr_decay_factor: 1
    lr_decay_steps: 100
    temperature: 1.0
    grad_clip_norm: 1.0
    weight_decay: 0.01
    freeze_encoder: false
    pubmedqa_strip_context: false
    similarity_function: cos
    top_k: 3
    last_k: 3
    min_pos_p: 0.01
    neg_mask_threshold: 0.5
    device: cuda:0
aggregation:
  name: linear_pooling
  config: {}
option_tokens:
- 'YES'
- 'NO'
cache_path: /research/projects/ecoai/yl2310/MultiLLMs/cache
_include_datasets:
- datasets/pubmedqa_context_only.yaml
num_epochs: 5
checkpoint_base_dir: /research/projects/ecoai/yl2310/MultiLLMs/checkpoints
training_batch_size: 30
auto_resume: false
balance_training_datasets: true
shuffle_data: true
shuffle_seed: 18
early_stopping_patience: 5
early_stopping_criterion: validation
report_to_wandb: true
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: router_dc_pubmedqa_8
_include_test_datasets:
- datasets/pubmedqa_context_only.yaml
test_datasets:
