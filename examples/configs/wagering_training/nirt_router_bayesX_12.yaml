calibrated: false
wagering_method:
  name: nirt_router
  config:
    encoder_model_name: bert-base-uncased
    tokenizer_use_fast: false
    max_seq_length: 512
    learning_rate: 5e-5
    lr_decay_factor: 1
    lr_decay_steps: 100
